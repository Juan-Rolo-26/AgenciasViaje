<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topotours | Web en desarrollo</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Manrope", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1b1f3b 0%, #0b0f1a 45%, #090b13 100%);
      color: #f5f7ff;
      padding: 24px;
    }

    .card {
      width: min(860px, 100%);
      background: rgba(15, 19, 35, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      padding: 44px 36px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .badge {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.8px;
      font-weight: 800;
      color: #c7d2fe;
      border: 1px solid rgba(99, 102, 241, 0.35);
      background: rgba(99, 102, 241, 0.18);
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.12;
      letter-spacing: -0.6px;
    }

    p {
      margin: 0;
      font-size: 17px;
      line-height: 1.7;
      color: rgba(238, 241, 255, 0.85);
    }

    hr {
      border: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
      margin: 24px 0 18px;
    }

    .foot {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-size: 13px;
      color: rgba(238, 241, 255, 0.62);
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 22px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">WEB EN DESARROLLO</span>
    <h1>Estamos trabajando en una nueva experiencia</h1>
    <p>
      Muy pronto vas a ver una web renovada, mas clara y con mejores experiencias.
      Gracias por tu paciencia.
    </p>
    <hr />
    <p class="foot">Volvemos en breve.</p>
  </main>
</body>
</html>
